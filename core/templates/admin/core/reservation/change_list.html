{% extends "admin/change_list.html" %}

{% block content %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />

 <style>
  /* Agrandir la zone des dates pour plus de lisibilité */
  .fc .fc-daygrid-day-number {
    font-size: 1.2em;
    font-weight: bold;
    color: #444;
  }
  
  /* Meilleure hauteur pour les événements */
  .fc-event {
    margin-bottom: 3px !important;
    padding: 4px 8px !important;
    border-radius: 4px !important;
    white-space: normal; /* Permet au texte de passer à la ligne */
  }
  
  /* Style des boutons de navigation */
  .fc .fc-button {
    text-transform: capitalize;
  }
</style>
</style>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>

<div id='calendar' style="margin-bottom: 30px; background: white; padding: 20px;"></div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'fr',
      // Activation de la navigation mois/année
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,dayGridYear,listMonth'
      },
      events: {{ events|safe }},
      // Amélioration de la visibilité des événements
      eventDisplay: 'block', 
      eventDidMount: function(info) {
        // Ajout d'un petit effet au survol pour mieux voir la date
        info.el.style.padding = "4px";
        info.el.style.fontSize = "0.9em";
      }
    });
    calendar.render();
  });
</script>

{{ block.super }}
{% endblock %}
